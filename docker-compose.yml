services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch
    environment:
      cluster.name: hemo-es-cluster
      node.name: elasticsearch
      discovery.seed_hosts: elasticsearch-2,elasticsearch-3
      cluster.initial_master_nodes: elasticsearch,elasticsearch-2,elasticsearch-3
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data_1:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch-2
    environment:
      cluster.name: hemo-es-cluster
      node.name: elasticsearch-2
      discovery.seed_hosts: elasticsearch,elasticsearch-3
      cluster.initial_master_nodes: elasticsearch,elasticsearch-2,elasticsearch-3
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es_data_2:/usr/share/elasticsearch/data

  elasticsearch-3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch-3
    environment:
      cluster.name: hemo-es-cluster
      node.name: elasticsearch-3
      discovery.seed_hosts: elasticsearch,elasticsearch-2
      cluster.initial_master_nodes: elasticsearch,elasticsearch-2,elasticsearch-3
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es_data_3:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend
    container_name: hemo-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-primary:5432/bloodbank
      SPRING_DATASOURCE_USERNAME: hemo_user
      SPRING_DATASOURCE_PASSWORD: hemo_pass
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8080:8080"
    depends_on:
      postgres-primary:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  postgres-primary:
    image: postgres:16
    container_name: postgres-primary
    environment:
      POSTGRES_DB: bloodbank
      POSTGRES_USER: hemo_user
      POSTGRES_PASSWORD: hemo_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hemo_user -d bloodbank"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres-replica:
    image: postgres:16
    container_name: postgres-replica
    environment:
      POSTGRES_DB: bloodbank
      POSTGRES_USER: hemo_user
      POSTGRES_PASSWORD: hemo_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hemo_user -d bloodbank"]
      interval: 10s
      timeout: 5s
      retries: 30

  redcross-db:
    image: postgres:16
    container_name: redcross-db
    environment:
      POSTGRES_DB: redcross_db
      POSTGRES_USER: redcross_user
      POSTGRES_PASSWORD: redcross_pass
    ports:
      - "5434:5432"
    volumes:
      - ./Redcross/src/main/resources/sourcetables.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redcross_user -d redcross_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  redcross-service:
    build:
      context: ./Redcross
    container_name: redcross-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://redcross-db:5432/redcross_db
      SPRING_DATASOURCE_USERNAME: redcross_user
      SPRING_DATASOURCE_PASSWORD: redcross_pass
    ports:
      - "8081:8081"
    depends_on:
      redcross-db:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch_data_1:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/etc/clickhouse-server/config.d/01-cluster.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse-2:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse-2
    volumes:
      - ch_data_2:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/etc/clickhouse-server/config.d/01-cluster.xml:ro

  clickhouse-3:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse-3
    volumes:
      - ch_data_3:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/etc/clickhouse-server/config.d/01-cluster.xml:ro

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: hemo-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hemo-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

  who-db:
    image: postgres:16
    container_name: who-db
    environment:
      POSTGRES_DB: who_db
      POSTGRES_USER: who_user
      POSTGRES_PASSWORD: who_pass
    ports:
      - "5435:5432"
    volumes:
      - ./who/src/main/resources/source_coder.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U who_user -d who_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  who-service:
    build:
      context: ./who
    container_name: who-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://who-db:5432/who_db
      SPRING_DATASOURCE_USERNAME: who_user
      SPRING_DATASOURCE_PASSWORD: who_pass
    ports:
      - "8082:8082"
    depends_on:
      who-db:
        condition: service_healthy

volumes:
  pg_primary_data:
  pg_replica_data:
  es_data_1:
  es_data_2:
  es_data_3:
  ch_data_1:
  ch_data_2:
  ch_data_3:
  grafana_data:
