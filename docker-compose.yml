services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch
    env_file:
      - ./.env
    environment:
      SINGLE_MODE: ${SINGLE_MODE}
      cluster.name: hemo-es-cluster
      node.name: elasticsearch
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    command:
      - bash
      - -lc
      - |
        if [ "$$SINGLE_MODE" = "true" ]; then
          exec /usr/local/bin/docker-entrypoint.sh eswrapper -E discovery.type=single-node -E cluster.name=hemo-es-cluster -E node.name=elasticsearch -E xpack.security.enabled=false
        else
          exec /usr/local/bin/docker-entrypoint.sh eswrapper -E cluster.name=hemo-es-cluster -E node.name=elasticsearch -E discovery.seed_hosts=elasticsearch-2,elasticsearch-3 -E cluster.initial_master_nodes=elasticsearch,elasticsearch-2,elasticsearch-3 -E xpack.security.enabled=false
        fi
    volumes:
      - es_data_1:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch-2
    profiles: ["full"]
    env_file:
      - ./.env
    environment:
      cluster.name: hemo-es-cluster
      node.name: elasticsearch-2
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es_data_2:/usr/share/elasticsearch/data

  elasticsearch-3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hemo-elasticsearch-3
    profiles: ["full"]
    env_file:
      - ./.env
    environment:
      cluster.name: hemo-es-cluster
      node.name: elasticsearch-3
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - es_data_3:/usr/share/elasticsearch/data

  postgres-primary:
    image: postgres:16
    container_name: postgres-primary
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_PRIMARY_DB}
      POSTGRES_USER: ${POSTGRES_PRIMARY_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PRIMARY_PASSWORD}
    command:
      - bash
      - -ec
      - |
        docker-entrypoint.sh postgres \
          -c wal_level=replica \
          -c max_wal_senders=10 \
          -c max_replication_slots=10 \
          -c hot_standby=on \
          -c listen_addresses=* &
        pid=$!
        until [ -f "$$PGDATA/pg_hba.conf" ]; do
          sleep 1
        done
        if ! grep -q '^host replication hemo_user 0.0.0.0/0 scram-sha-256$$' "$$PGDATA/pg_hba.conf"; then
          echo 'host replication hemo_user 0.0.0.0/0 scram-sha-256' >> "$$PGDATA/pg_hba.conf"
          pg_ctl -D "$$PGDATA" reload || true
        fi
        wait $$pid
    ports:
      - "5432:5432"
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U hemo_user -d bloodbank"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres-replica:
    image: postgres:16
    container_name: postgres-replica
    profiles: ["full"]
    depends_on:
      postgres-primary:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_PRIMARY_DB}
      POSTGRES_USER: ${POSTGRES_PRIMARY_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PRIMARY_PASSWORD}
      PGPASSWORD: ${POSTGRES_PRIMARY_PASSWORD}
    command:
      - bash
      - -ec
      - |
        if [ ! -s "$$PGDATA/PG_VERSION" ]; then
          until pg_basebackup -h postgres-primary -p 5432 -D "$$PGDATA" -U hemo_user -v -P -R -X stream -C -S replica_slot; do
            echo "Waiting for primary to accept replication connections..."
            sleep 2
          done
          chown -R postgres:postgres "$$PGDATA"
          chmod 700 "$$PGDATA"
        fi
        exec docker-entrypoint.sh postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U hemo_user -d bloodbank"]
      interval: 10s
      timeout: 5s
      retries: 30

  redcross-db:
    image: postgres:16
    container_name: redcross-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${REDCROSS_DB_NAME}
      POSTGRES_USER: ${REDCROSS_DB_USER}
      POSTGRES_PASSWORD: ${REDCROSS_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - redcross_db_data:/var/lib/postgresql/data
      - ./Redcross/src/main/resources/sourcetables.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redcross_user -d redcross_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  who-db:
    image: postgres:16
    container_name: who-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${WHO_DB_NAME}
      POSTGRES_USER: ${WHO_DB_USER}
      POSTGRES_PASSWORD: ${WHO_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - who_db_data:/var/lib/postgresql/data
      - ./who/src/main/resources/source_coder.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U who_user -d who_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse

    ports:
      - "8123:8123"
      - "9000:9000"

    env_file:
      - ./.env

    environment:
      SINGLE_MODE: ${SINGLE_MODE}

    command:
      - bash
      - -lc
      - |
        if [ "$$SINGLE_MODE" = "true" ]; then
          cp /config-src/cluster.single.xml /etc/clickhouse-server/config.d/01-cluster.xml
        else
          cp /config-src/cluster.full.xml /etc/clickhouse-server/config.d/01-cluster.xml
        fi
        exec /entrypoint.sh

    volumes:
      - ch_data_1:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/config-src/cluster.full.xml:ro
      - ./Clickhouse/resources/cluster.single.xml:/config-src/cluster.single.xml:ro

    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse-2:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse-2
    profiles: ["full"]
    env_file:
      - ./.env
    volumes:
      - ch_data_2:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/etc/clickhouse-server/config.d/01-cluster.xml:ro

  clickhouse-3:
    image: clickhouse/clickhouse-server:24.8
    container_name: hemo-clickhouse-3
    profiles: ["full"]
    env_file:
      - ./.env
    volumes:
      - ch_data_3:/var/lib/clickhouse
      - ./Clickhouse/resources/schema_clickhouse.sql:/docker-entrypoint-initdb.d/01_schema_clickhouse.sql:ro
      - ./Clickhouse/resources/cluster.xml:/etc/clickhouse-server/config.d/01-cluster.xml:ro

  backend:
    build:
      context: ./backend
    container_name: hemo-backend
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: ${BACKEND_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${BACKEND_SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BACKEND_SPRING_DATASOURCE_PASSWORD}
      ELASTICSEARCH_URL: ${BACKEND_ELASTICSEARCH_URL}
    ports:
      - "8080:8080"
    depends_on:
      postgres-primary:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  redcross-service:
    build:
      context: ./Redcross
    container_name: redcross-service
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: ${REDCROSS_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${REDCROSS_SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${REDCROSS_SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      redcross-db:
        condition: service_healthy

  who-service:
    build:
      context: ./who
    container_name: who-service
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: ${WHO_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${WHO_SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${WHO_SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      who-db:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: hemo-grafana
    env_file:
      - ./.env
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hemo-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

  etl-service:
    build:
      context: ./etl-service
    container_name: etl-service
    env_file:
      - ./.env
    ports:
      - "8083:8080"
    depends_on:
      who-service:
        condition: service_started
      redcross-service:
        condition: service_started
      clickhouse:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - etl_data:/data

volumes:
  pg_primary_data:
  pg_replica_data:
  es_data_1:
  es_data_2:
  es_data_3:
  ch_data_1:
  ch_data_2:
  ch_data_3:
  grafana_data:
  etl_data:
  redcross_db_data:
  who_db_data: