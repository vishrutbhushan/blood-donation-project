<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hemo Connect</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <span class="eyebrow">Hemo Connect</span>
          <h1>Scaffold ready</h1>
          <p class="lead">Plain frontend scaffold with npm only.</p>
        </div>
        <div class="status-panel">
          <div class="status-row">
            <span>Frontend</span>
            <strong class="ok">Ready</strong>
          </div>
          <div class="status-row">
            <span>Backend</span>
            <strong class="ok">Connected via compose</strong>
          </div>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Starter UI</h2>
          <p class="note">Add pages and API calls here when you are ready.</p>
        </article>
      </section>
    </main>
  </body>
</html>
