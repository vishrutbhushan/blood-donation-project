server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-primary:5432/bloodbank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hemo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hemo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
app.elasticsearch-url=${ELASTICSEARCH_URL:http://elasticsearch:9200}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true